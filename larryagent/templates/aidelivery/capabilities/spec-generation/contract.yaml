extends: ../_base/base-contract.yaml
name: spec-generation
version: "1.0.0"
description: Generate spec.md from requirement analysis.
inputs:
  required:
    - requirement-analysis.md
  optional:
    - existing_files
    - prior_evidence
outputs:
  required:
    - spec.md
  optional:
    - followup_risks
success_status:
  - success
failure_status:
  - failed
  - blocked
  - partial
failure_codes:
  - MISSING_INPUT
  - VALIDATION_FAILED
  - EXECUTION_ERROR
  - UNKNOWN_ERROR
evidence_required:
  - spec.md
retry_policy:
  retryable_failure_codes:
    - UNKNOWN_ERROR
  max_retries: 1
quality_gates:
  - spec-must-be-produced
