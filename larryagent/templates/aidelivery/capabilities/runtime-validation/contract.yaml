extends: ../_base/base-contract.yaml
name: runtime-validation
version: "1.0.0"
description: Run runtime or smoke validation after implementation.
inputs:
  required:
    - changed_files
  optional:
    - existing_files
    - prior_evidence
outputs:
  required:
    - runtime-validation-report.md
  optional:
    - followup_risks
success_status:
  - success
failure_status:
  - failed
  - blocked
  - partial
failure_codes:
  - MISSING_INPUT
  - VALIDATION_FAILED
  - EXECUTION_ERROR
  - UNKNOWN_ERROR
evidence_required:
  - runtime-validation-report.md
retry_policy:
  retryable_failure_codes:
    - UNKNOWN_ERROR
  max_retries: 1
quality_gates:
  - runtime-validation-required
