extends: ../_base/base-contract.yaml
name: requirement-analysis
version: "1.0.0"
description: Analyze the requirement and produce requirement-analysis.md.
inputs:
  required:
    - normalized_requirement
  optional:
    - existing_files
    - prior_evidence
outputs:
  required:
    - requirement-analysis.md
  optional:
    - followup_risks
success_status:
  - success
failure_status:
  - failed
  - blocked
  - partial
failure_codes:
  - MISSING_INPUT
  - VALIDATION_FAILED
  - EXECUTION_ERROR
  - UNKNOWN_ERROR
evidence_required:
  - requirement-analysis.md
retry_policy:
  retryable_failure_codes:
    - UNKNOWN_ERROR
  max_retries: 1
quality_gates:
  - analysis-must-be-produced
